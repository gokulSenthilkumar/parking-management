spring.application.name=parking-backend

# H2 file-based database - data persists between restarts in backend/data/
spring.datasource.url=jdbc:h2:file:./data/parkingdb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8080}

# Comma-separated list of allowed frontend origins for CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,https://parknest-pl.netlify.app}
